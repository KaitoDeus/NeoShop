server:
  port: 8080

spring:
  application:
    name: neoshop
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: yyyy-MM-dd'T'HH:mm:ss

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:REPLACE_WITH_SECURE_JWT_SECRET_IN_PRODUCTION_MIN_64_CHARS_BASE64_STRING}
      expiration: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

# Swagger / OpenAPI Configuration
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html

# Health Check & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Sentry Configuration
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0
  exception-resolver-order: -2147483648

logging:
  level:
    org.springframework.security: DEBUG
    com.neoshop: DEBUG

# VNPay Configuration
vnpay:
  tmnCode: ${VNPAY_TMN_CODE:your_vnpay_tmn_code}
  hashSecret: ${VNPAY_HASH_SECRET:your_vnpay_hash_secret}
  payUrl: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  returnUrl: ${VNPAY_RETURN_URL:http://localhost:5173/order-success/}
  apiUrl: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

# MoMo Configuration
momo:
  partnerCode: ${MOMO_PARTNER_CODE:your_momo_partner_code}
  accessKey: ${MOMO_ACCESS_KEY:your_momo_access_key}
  secretKey: ${MOMO_SECRET_KEY:your_momo_secret_key}
  endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
  redirectUrl: ${MOMO_REDIRECT_URL:http://localhost:5173/order-success/}
  ipnUrl: ${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}

# Google OAuth2 Configuration
google:
  client-id: ${GOOGLE_CLIENT_ID:your_google_client_id}

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

# Enable Swagger in Dev
SPRINGDOC_ENABLED: true
